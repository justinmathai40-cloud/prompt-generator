<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prompt Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 min-h-screen flex items-center justify-center p-6">

  <div class="w-full max-w-2xl bg-gray-900 rounded-2xl shadow-xl p-8">

    <h1 class="text-3xl font-bold text-white mb-2">✨ Prompt Generator</h1>
    <p class="text-gray-400 mb-8">Tell us your goal — we'll write the perfect AI prompt for you.</p>

    <label class="text-gray-300 text-sm font-medium mb-2 block">What do you want to do?</label>
    <textarea
      id="userGoal"
      rows="3"
      placeholder="e.g. Write a product description for my handmade soap business..."
      class="w-full bg-gray-800 text-white rounded-xl p-4 text-sm border border-gray-700 focus:outline-none focus:border-purple-500 resize-none mb-6"
    ></textarea>

    <div class="grid grid-cols-2 gap-4 mb-6">
      <div>
        <label class="text-gray-300 text-sm font-medium mb-2 block">Target AI</label>
        <select id="targetAI" class="w-full bg-gray-800 text-white rounded-xl p-3 text-sm border border-gray-700 focus:outline-none focus:border-purple-500">
          <option value="ChatGPT">ChatGPT</option>
          <option value="Claude">Claude</option>
          <option value="Gemini">Gemini</option>
          <option value="Grok">Grok</option>
        </select>
      </div>
      <div>
        <label class="text-gray-300 text-sm font-medium mb-2 block">Category</label>
        <select id="category" class="w-full bg-gray-800 text-white rounded-xl p-3 text-sm border border-gray-700 focus:outline-none focus:border-purple-500">
          <option value="Writing">Writing</option>
          <option value="Marketing">Marketing</option>
          <option value="Coding">Coding</option>
          <option value="Business">Business</option>
          <option value="Education">Education</option>
        </select>
      </div>
    </div>

    <button
      id="generateBtn"
      onclick="generatePrompt()"
      class="w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-4 rounded-xl transition duration-200 text-base"
    >
      ✨ Generate Prompt
    </button>

    <div id="outputSection" class="mt-8 hidden">
      <label class="text-gray-300 text-sm font-medium mb-2 block">Your generated prompt:</label>
      <div id="output"
        class="w-full bg-gray-800 text-green-400 rounded-xl p-4 text-sm border border-gray-700 leading-relaxed whitespace-pre-wrap"
      ></div>
      <button
        onclick="copyPrompt()"
        class="mt-3 text-sm text-purple-400 hover:text-purple-300 underline"
      >
        Copy to clipboard
      </button>
    </div>

  </div>

  <script>
    const API_KEY = "";

    async function generatePrompt() {
      const goal = document.getElementById('userGoal').value.trim();
      const ai = document.getElementById('targetAI').value;
      const category = document.getElementById('category').value;
      const btn = document.getElementById('generateBtn');
      const outputSection = document.getElementById('outputSection');
      const output = document.getElementById('output');

      if (!goal) {
        alert('Please tell us what you want to do first!');
        return;
      }

      btn.textContent = '⏳ Generating...';
      btn.disabled = true;
      outputSection.classList.add('hidden');

      const systemPrompt = `You are an expert prompt engineer. Your job is to take a user's simple goal and turn it into a highly optimised, detailed prompt specifically for ${ai}.

The category is: ${category}.

Rules for writing the prompt:
- Start with a clear role for the AI (e.g. "You are an expert copywriter...")
- Include specific context and background
- Give a clear, detailed task
- Specify the format of the output (bullet points, paragraphs, length, etc.)
- Set the tone (professional, friendly, creative, etc.)
- Add any useful constraints or requirements

Return ONLY the final optimised prompt. No explanations. No extra text. Just the prompt itself.`;

      try {
        const response = await fetch("/api/generate", {
  method: "POST",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify({ systemPrompt, goal })
});

        const data = await response.json();

        if (data.choices && data.choices[0]) {
          output.textContent = data.choices[0].message.content;
          outputSection.classList.remove('hidden');
        } else {
          output.textContent = "Something went wrong. Error: " + JSON.stringify(data);
          outputSection.classList.remove('hidden');
        }

      } catch (error) {
        output.textContent = "Error: " + error.message;
        outputSection.classList.remove('hidden');
      }

      btn.textContent = '✨ Generate Prompt';
      btn.disabled = false;
    }

    function copyPrompt() {
      const text = document.getElementById('output').textContent;
      navigator.clipboard.writeText(text);
      alert('Copied to clipboard! ✅');
    }
  </script>

</body>
</html>
